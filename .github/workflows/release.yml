name: Release

on:
  push:
    tags:
      - "v*"

# Allow the workflow to create releases and upload assets.
permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    # noti depends on libadwaita >= 1.8 (feature "v1_8"), which is only
    # available on rolling-release distros, so we build inside Arch Linux.
    container:
      image: archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git rust \
            gtk4 libadwaita gtksourceview5 \
            nodejs npm tar gzip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build (release)
        run: cargo build --release --locked

      - name: Package tarball
        id: package
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          name="noti-${version}-x86_64-linux"
          dist="dist/${name}"

          mkdir -p "${dist}/target/release" "${dist}/resources"
          cp target/release/noti "${dist}/target/release/noti"
          cp -r resources/. "${dist}/resources/"
          cp Makefile LICENSE README.md "${dist}/"

          tar -C dist -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"

          echo "tarball=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "noti ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.tarball }}.sha256

  publish-aur:
    name: Publish to AUR (noti-notes)
    runs-on: ubuntu-latest
    needs: build-linux
    container:
      image: archlinux:latest
    steps:
      - name: Check for AUR SSH key
        id: guard
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "${AUR_SSH_PRIVATE_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AUR_SSH_PRIVATE_KEY secret not set — skipping AUR publish."
          fi

      - name: Install tooling
        if: steps.guard.outputs.enabled == 'true'
        run: |
          pacman -Syu --noconfirm --needed base-devel git pacman-contrib openssh

      - name: Derive version
        if: steps.guard.outputs.enabled == 'true'
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH and makepkg user
        if: steps.guard.outputs.enabled == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          # makepkg refuses to run as root, so create an unprivileged builder.
          useradd -m builder
          mkdir -p /home/builder/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > /home/builder/.ssh/aur
          chmod 600 /home/builder/.ssh/aur
          ssh-keyscan -t ed25519,rsa aur.archlinux.org > /home/builder/.ssh/known_hosts 2>/dev/null
          cat > /home/builder/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          chown -R builder:builder /home/builder/.ssh

      - name: Update AUR package
        if: steps.guard.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          su builder -c '
            set -euo pipefail
            cd "$HOME"
            git config --global user.name "L3-N0X"
            git config --global user.email "leon.goett@web.de"
            git clone ssh://aur@aur.archlinux.org/noti-notes.git aur
            cd aur
            sed -i "s/^pkgver=.*/pkgver='"${VERSION}"'/" PKGBUILD
            sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
            updpkgsums
            makepkg --printsrcinfo > .SRCINFO
            git add PKGBUILD .SRCINFO
            git commit -m "Update to '"${VERSION}"'" || { echo "Nothing to commit"; exit 0; }
            git push
          '
